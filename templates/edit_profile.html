<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoApply — Edit Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Glass panels */
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        header h1 { font-size: 1.75rem; font-weight: 700; color: #fff; }
        header h1 i { color: #8b5cf6; margin-right: 0.5rem; }
        header p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.25rem; }
        
        /* Buttons */
        .btn {
            padding: 0.6rem 1.2rem; border: none; border-radius: 8px;
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.5rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-blue:hover { background: #2563eb; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .btn-outline { background: transparent; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); color: #fff; }
        
        /* Textarea */
        textarea {
            width: 100%;
            height: 600px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            color: #a5b4fc;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }
        textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
        }
        
        /* Alerts */
        .alert {
            padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: 0.75rem;
        }
        .alert-success { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .alert-error { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1><i class="fa-solid fa-user-pen"></i> Edit Profile Data</h1>
            <p>Update your resume details in YAML format. The AI uses this for tailoring.</p>
        </div>
        <a href="/" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    </header>

    {% if success %}
    <div class="alert alert-success">
        <i class="fa-solid fa-circle-check"></i> Profile updated successfully!
    </div>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">
        <i class="fa-solid fa-circle-exclamation"></i> <strong>Error parsing YAML:</strong> {{ error }}
    </div>
    {% endif %}

    <div class="glass">
        <form method="POST" action="/edit_profile">
            <textarea name="yaml_content" spellcheck="false">{{ yaml_content }}</textarea>
            <div style="margin-top: 1rem; display: flex; justify-content: flex-end;">
                <button type="submit" class="btn btn-blue"><i class="fa-solid fa-floppy-disk"></i> Save Profile Details</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
