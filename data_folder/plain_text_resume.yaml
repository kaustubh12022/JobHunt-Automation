projects:
  - name: "SmartApply: AI-Driven Job Automation Pipeline"
    description: "Engineered a scalable Python and Pandas-based web scraping pipeline to aggregate, filter, and deduplicate 800+ job postings daily, enforcing geographic and entry-level constraints. Integrated DeepSeek LLM with strategic prompt caching and optimized inference modes to reduce API token consumption by over 80% while increasing processing throughput. Designed a JSON-based multi-dimensional AI scoring algorithm that evaluates job descriptions against core technical stacks, explicitly filtering out senior roles and false positives. Built a local rendering engine using Jinja2 and WeasyPrint to dynamically generate ATS-compliant, tailored PDF resumes based on skills extracted from targeted job descriptions. Automated the entire workflow with Windows Task Scheduler, integrating SMTP email delivery and Excel tracker generation for seamless daily execution without manual intervention."
    link: "Python, Pandas, DeepSeek API, Jinja2, WeasyPrint, BeautifulSoup"

  - name: "CampFlow: Hospitality Automation & Booking Suite"
    description: "Engineered a dynamic camping automation platform utilized by 5+ local business owners to solve booking gaps. Developed role-specific dashboards for Managers and Owners, featuring real-time business analytics. Implemented keyword-friendly SEO strategies to boost search visibility and organic traffic for hosted sites. Deployed the production-ready application on Vercel, streamlining the end-to-end booking workflow."
    link: "Web Automation"

  - name: "Neon-Pulse – Pattern Recognition & Logic Engine"
    description: "Developed a logic-driven game with a recursive sequence system managing over 20 levels of difficulty. Designed a responsive 'Cyber-Neon' UI using CSS3 animations, achieving 100% layout consistency. Optimized DOM-based rendering for instant visual feedback, ensuring a zero-lag gameplay experience. Built a robust state-validation algorithm to compare user-input arrays against patterns with 100% accuracy."
    link: "Vanilla JavaScript"

